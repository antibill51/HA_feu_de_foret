name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  zip:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Zip integration
        run: |
          cd custom_components/feux_de_foret
          zip -r ../../feux_de_foret.zip .
      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: feux_de_foret.zip
